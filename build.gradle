plugins {
    id 'java'
    id 'application'
    id 'org.springframework.boot' version '3.4.0'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'org.patidar'
version = '1.0-SNAPSHOT'

java {
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot dependencies
    implementation 'org.springframework.boot:spring-boot-starter'

    // Testing dependencies
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation platform('org.junit:junit-bom:6.0.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

// Disable Spring Boot's bootJar task since this is not a Spring Boot application
// This project demonstrates SOLID principles and doesn't need to be packaged as a Spring Boot jar
tasks.named('bootJar') {
    enabled = false
}

tasks.named('jar') {
    enabled = true
    manifest {
        attributes 'Main-Class': 'org.patidar.Main'
    }
}

// Configure the application plugin for easy running
application {
    mainClass = 'org.patidar.Main'
}